[global]

; Error log level
; Possible Values: alert, error, warning, notice, debug
log_level = notice

; Path to error log file. If it's set to "syslog",  
; log is sent to syslogd instead of being written in a local file.
error_log = /proc/self/fd/2

; Log limit for the logged lines which allows to log messages longer than 1024 characters without wrapping.
log_limit = 4096

[www]

; Unix user of FPM processes. This option is mandatory.
user = www-data

; Unix group of FPM processes. If not set, the default user's group is used.
group = www-data

; Clear environment in FPM workers. 
; Prevents arbitrary environment variables from reaching FPM worker processes 
; by clearing the environment in workers before env vars specified 
; in this pool configuration are added.
clear_env = yes

; Send FPM to background. Set to 'no' to keep FPM in foreground for debugging.
; daemonize = yes

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Error handling and logging ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; The log file for slow requests. 
slowlog = /proc/self/fd/2

; The access log file.
; Disable access log to avoid noise in container logs.
;access.log = /proc/self/fd/2

;;;;;;;;;;;;;;;;;;;;
; System Handling ;
;;;;;;;;;;;;;;;;;;;

; Choose how the process manager will control the number of child processes. Possible values: static, ondemand, dynamic. This option is mandatory.
pm = dynamic

; The number of child processes to be created when pm is set to static and 
; the maximum number of child processes to be created when 
; pm is set to dynamic. This option is mandatory. This option sets the limit 
; on the number of simultaneous requests that will be served. 
; Equivalent to the ApacheMaxClients directive with mpm_prefork and 
; to the PHP_FCGI_CHILDREN environment variable in the original PHP FastCGI.
pm.max_children = 50

; The number of child processes created on startup. 
; Used only when pm is set to dynamic.
pm.start_servers = 1

; The desired minimum number of idle server processes. 
; Used only when pm is set to dynamic. Also mandatory in this case.
pm.min_spare_servers = 1

; The desired maximum number of idle server processes. 
; Used only when pm is set to dynamic. Also mandatory in this case.
pm.max_spare_servers = 5

; The number of rate to spawn child processes at once. 
; Used only when pm is set to dynamic.
pm.max_spawn_rate = 10

; The number of requests each child process should execute before respawning.
; This can be useful to work around memory leaks in 3rd party libraries. 
; For endless request processing specify '0'. 
; Equivalent to PHP_FCGI_MAX_REQUESTS.
pm.max_requests = 500

; The address on which to accept FastCGI requests. 
; Valid syntaxes are: 'ip.add.re.ss:port', 'port', '/path/to/unix/socket'. 
; This option is mandatory for each pool.
listen = 9000

; Set permissions for unix socket, if one is used. 
; In Linux, read/write permissions must be set in order to allow 
; connections from a web server. 
; Many BSD-derived systems allow connections regardless of permissions.
listen.owner = nginx

listen.group = nginx

listen.mode = 0660