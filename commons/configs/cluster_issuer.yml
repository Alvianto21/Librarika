apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: librarika-staging
spec:
  acme:
    email: alviantovinsensius@gmail.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    profile: tlsserver
    privateKeySecretRef:
      name: librarika-staging-config
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: librarika-production
spec:
  acme:
    email: alviantovinsensius@gmail.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    profile: classic
    privateKeySecretRef:
      name: librarika-production-config
    solvers:
      - http01:
          ingress:
            class: nginx
